services:

  postgres:
    image: postgres:16
    container_name: auth-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./auth-service/database/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auth_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - app-network

  redis:
    image: redis:7
    container_name: auth-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - app-network

  auth-service:
    build:
      context: ./auth-service

    container_name: auth-service

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./auth-service/.env

    # environment:
    #   PORT: 8080

    #   DB_HOST: postgres
    #   DB_PORT: 5432
    #   DB_USER: postgres
    #   DB_PASSWORD: postgres
    #   DB_NAME: auth_db

    #   PRIVATE_KEY_PATH: /app/keys/private.pem

    #   JWT_ISSUER: auth-service

    ports:
      - "8080:8080"

    volumes:
      - ./auth-service/keys:/app/keys:ro

    networks:
      - app-network

  mongo:
    image: mongo:7
    container_name: orders-mongo

    environment:
      MONGO_INITDB_DATABASE: orders_db

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db
      - ./protected-service/database/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - app-network

  protected-service:
    build:
      context: ./protected-service

    container_name: protected-service

    depends_on:
      mongo:
        condition: service_healthy

    env_file:
      - ./protected-service/.env
    # environment:
    #   PORT: 8081

    #   MONGO_URI: mongodb://mongo:27017
    #   MONGO_DATABASE: orders_db

    #   PUBLIC_KEY_PATH: /app/keys/public.pem

    #   JWT_ISSUER: auth-service
    #   JWT_AUDIENCE: orders-service

    ports:
      - "8081:8081"

    volumes:
      - ./protected-service/keys:/app/keys:ro

    networks:
      - app-network

volumes:

  postgres_data:

  mongo_data:

  redis_data:

networks:

  app-network:
